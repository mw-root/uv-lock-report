name: uv Lockfile Report

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Report
        uses: mw-root/uv-lock-report@748605832c1f3d053bd670b16e43580165d87667 # main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
