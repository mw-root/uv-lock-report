name: uv Lockfile Report

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Report
        uses: mw-root/uv-lock-report@cf870db7cb19c89ec4be85438521585850c6f6d0 # main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
