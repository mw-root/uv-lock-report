name: uv Lockfile Report

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Report
        uses: mw-root/uv-lock-report@f7a4b30a9a2cef1d7e14d355d1e11869177d3634 # main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
