name: uv Lockfile Report

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Report
        uses: mw-root/uv-lock-report@ba2c93e17693cf392b4cf6e85e48f437697abc73 # main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
