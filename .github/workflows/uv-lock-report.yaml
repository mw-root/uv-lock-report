name: uv Lockfile Report

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Report
        uses: mw-root/uv-lock-report@ba2c93e17693cf392b4cf6e85e48f437697abc73 # main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
